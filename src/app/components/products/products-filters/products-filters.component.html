<p-accordion [value]=openPanels [multiple]=true>
  <p-accordion-panel value="0">
    <p-accordion-header>
      <h4 class="filters__title">Categoría</h4>
    </p-accordion-header>
    <p-accordion-content>
      <div class="flex flex-col gap-4">
        @for (item of categories; track item.value) {
          <div class="flex items-center" [class.filters__option--disabled]="categoryCounts[item.value] === 0 && !selectedCategories.includes(item.value)">
            <p-checkbox
              [inputId]="idPrefix + 'cat-' + item.value"
              name="categories"
              [value]="item.value"
              [(ngModel)]="selectedCategories"
              [disabled]="categoryCounts[item.value] === 0 && !selectedCategories.includes(item.value)"
              (ngModelChange)="emitChange()" />
            <label [for]="idPrefix + 'cat-' + item.value" class="ml-2">
              {{ item.label }} <span class="filters__count">({{ categoryCounts[item.value] }})</span>
            </label>
          </div>
        }
      </div>
    </p-accordion-content>
  </p-accordion-panel>
  <p-accordion-panel value="1">
    <p-accordion-header>
      <h4 class="filters__title">Conectividad</h4>
    </p-accordion-header>
    <p-accordion-content>
      <div class="flex flex-col gap-4">
        @for (item of connectivity; track item.value) {
          <div class="flex items-center" [class.filters__option--disabled]="connectivityCounts[item.value] === 0 && !selectedConnectivity.includes(item.value)">
            <p-checkbox
              [inputId]="idPrefix + 'conn-' + item.value"
              name="connectivity"
              [value]="item.value"
              [(ngModel)]="selectedConnectivity"
              [disabled]="connectivityCounts[item.value] === 0 && !selectedConnectivity.includes(item.value)"
              (ngModelChange)="emitChange()" />
            <label [for]="idPrefix + 'conn-' + item.value" class="ml-2">
              {{ item.label }} <span class="filters__count">({{ connectivityCounts[item.value] }})</span>
            </label>
          </div>
        }
      </div>
    </p-accordion-content>
  </p-accordion-panel>
  <p-accordion-panel value="2">
    <p-accordion-header>
      <h4 class="filters__title">Color</h4>
    </p-accordion-header>
    <p-accordion-content>
      <div class="flex flex-col gap-4">
        @for (item of colors; track item.value) {
          <div class="flex items-center" [class.filters__option--disabled]="colorCounts[item.value] === 0 && !selectedColors.includes(item.value)">
            <p-checkbox
              [inputId]="idPrefix + 'color-' + item.value"
              name="colors"
              [value]="item.value"
              [(ngModel)]="selectedColors"
              [disabled]="colorCounts[item.value] === 0 && !selectedColors.includes(item.value)"
              (ngModelChange)="emitChange()" />
            <label [for]="idPrefix + 'color-' + item.value" class="ml-2">
              {{ item.label }} <span class="filters__count">({{ colorCounts[item.value] }})</span>
            </label>
          </div>
        }
      </div>
    </p-accordion-content>
  </p-accordion-panel>
</p-accordion>
