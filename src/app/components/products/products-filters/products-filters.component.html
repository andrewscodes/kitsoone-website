<p-accordion [value]=openPanels [multiple]=true>
  <p-accordion-panel value="0">
    <p-accordion-header>
      <h4 class="filters__title">Categoría</h4>
    </p-accordion-header>
    <p-accordion-content>
      <div class="flex flex-col gap-4">
        @for (item of categories; track item.value) {
          <div class="flex items-center">
            <p-checkbox [inputId]="idPrefix + 'cat-' + item.value" name="categories" [value]="item.value" [(ngModel)]="selectedCategories" (ngModelChange)="emitChange()" />
            <label [for]="idPrefix + 'cat-' + item.value" class="ml-2">{{ item.label }}</label>
          </div>
        }
      </div>
    </p-accordion-content>
  </p-accordion-panel>
  <p-accordion-panel value="1">
    <p-accordion-header>
      <h4 class="filters__title">Conectividad</h4>
    </p-accordion-header>
    <p-accordion-content>
      <div class="flex flex-col gap-4">
        @for (item of connectivity; track item.value) {
          <div class="flex items-center">
            <p-checkbox [inputId]="idPrefix + 'conn-' + item.value" name="connectivity" [value]="item.value" [(ngModel)]="selectedConnectivity" (ngModelChange)="emitChange()" />
            <label [for]="idPrefix + 'conn-' + item.value" class="ml-2">{{ item.label }}</label>
          </div>
        }
      </div>
    </p-accordion-content>
  </p-accordion-panel>
  <p-accordion-panel value="2">
    <p-accordion-header>
      <h4 class="filters__title">Color</h4>
    </p-accordion-header>
    <p-accordion-content>
      <div class="flex flex-col gap-4">
        @for (item of colors; track item.value) {
          <div class="flex items-center">
            <p-checkbox [inputId]="idPrefix + 'color-' + item.value" name="colors" [value]="item.value" [(ngModel)]="selectedColors" (ngModelChange)="emitChange()" />
            <label [for]="idPrefix + 'color-' + item.value" class="ml-2">{{ item.label }}</label>
          </div>
        }
      </div>
    </p-accordion-content>
  </p-accordion-panel>
</p-accordion>
