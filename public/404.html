<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect — always send to root index.html
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        '/?p=' + encodeURIComponent(path.slice(1) + search) +
        (hash ? '&hash=' + encodeURIComponent(hash.slice(1)) : '')
      );
    </script>
  </head>
  <body></body>
</html>
